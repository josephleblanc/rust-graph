<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Graph</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #05070a;
      }

      canvas {
        width: 100% !important;
        height: 100% !important;
        display: block;
      }
    </style>
  </head>
  <body>
    <canvas id="bevy"></canvas>
    <link
      data-trunk
      rel="rust"
      data-bin="web-graph"
      data-cargo-features="web"
      data-no-default-features
    />
  </body>
</html>
